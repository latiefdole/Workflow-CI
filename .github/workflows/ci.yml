name: CI - Train, Upload & Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib dagshub

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          mlflow run MLProject/ --env-manager local

      - name: Upload mlruns artifact to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: mlflow-model-artifacts
          path: mlruns/
          retention-days: 30

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get latest run ID
        id: get_run_id
        run: |
          RUN_ID=$(ls mlruns/0/ | grep -v meta.yaml | head -1)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Found run ID: $RUN_ID"

      - name: Build Docker image with MLflow
        run: |
          mlflow models build-docker \
            -m "mlruns/0/${{ steps.get_run_id.outputs.run_id }}/artifacts/model" \
            -n "${{ secrets.DOCKER_USERNAME }}/wine-quality-model" \
            --enable-mlserver

      - name: Push Docker image to Docker Hub
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:latest \
                     ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:${{ github.sha }}
          echo "✅ Docker image pushed!"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:latest"
